name: Update Oil Price Dashboard

on:
  schedule:
    - cron: '0 10 * * *' # รันอัตโนมัติทุกวันเวลา 10:00 น. (เวลาไทยประมาณ 17:00 น.)
  workflow_dispatch:      # ช่วยให้กดรันเองได้ทันทีเพื่อทดสอบ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
